# ==============================================================================
# golangci-lint configuration (v2 format)
#
# Teaching note: golangci-lint runs many linters simultaneously.
# This file lets you enable/disable linters and configure their behavior.
#
# v2 breaking changes vs v1:
#   - `version: "2"` is now required at the root
#   - linter settings moved from top-level `linters-settings:` into `linters.settings:`
# ==============================================================================

version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck      # Check that errors are handled
    - gosimple      # Suggest simpler code constructs
    - govet         # Reports suspicious constructs
    - ineffassign   # Detects ineffectual assignments
    - staticcheck   # Comprehensive static analysis
    - unused        # Finds unused code
    - gofmt         # Checks code formatting
    - goimports     # Checks import grouping

